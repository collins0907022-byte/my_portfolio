<!-- ================= MODERN INQUIRY PAGE (ALIVE UI) ================= --><!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inquiry</title>
    <link
      href="https://cdn.jsdelivr.net/npm/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: Arial;
        background: #0f172a;
        color: #fff;
        display: flex;
      }

      /* SIDEBAR */
      .sidebar {
        width: 240px;
        height: 100vh;
        background: #020617;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .sidebar h2 {
        margin-bottom: 10px;
        color: #94a3b8;
      }

      .nav-item {
        padding: 12px;
        border-radius: 10px;
        background: #0f172a;
        cursor: pointer;
        transition: 0.2s;
      }

      .nav-item:hover {
        background: #00ffee22;
        transform: translateX(5px);
      }

      a {
        text-decoration: none;
        color: white;
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: 5px;
      }

      /* MAIN */
      .main {
        flex: 1;
        display: flex;
        flex-direction: column;
      }

      /* HEADER */
      .header {
        height: 70px;
        background: #0f172a;
        position: relative;
        display: flex;
        align-items: center;
        padding-left: 30px;
        overflow: hidden;
      }

      .header h1 {
        z-index: 2;
        font-size: 30px;
        color: #ffffffcc;
        transition:
          opacity 0.4s ease,
          transform 0.4s ease;
        background: linear-gradient(90deg, #38bdf8, #00ffee);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .dots {
        position: absolute;
        width: 100%;
        height: 100%;
      }

      .dot {
        position: absolute;
        top: 50%;
        width: 10px;
        height: 10px;
        background: #00ffee;
        border-radius: 50%;
        transform: translateY(-50%) scale(0.3);
        animation: flow 4s infinite ease-in-out;
      }

      @keyframes flow {
        0% {
          left: 0;
          opacity: 0.1;
          transform: translateY(-50%) scale(0.3);
        }
        50% {
          left: 50%;
          opacity: 1;
          transform: translateY(-50%) scale(1.8);
          box-shadow: 0 0 25px #00ffee;
        }
        100% {
          left: 100%;
          opacity: 0.1;
          transform: translateY(-50%) scale(0.3);
        }
      }

      /* CONTENT */
      .content {
        flex: 1;
        display: grid;
        grid-template-columns: 1fr 1fr;
      }

      /* LEFT DESIGN PANEL */
      .left {
        background: linear-gradient(135deg, #00ffee22, #00ffee05);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px;
      }

      .left-box {
        max-width: 400px;
      }

      .left-box h2 {
        font-size: 32px;
        margin-bottom: 10px;
      }

      .left-box p {
        color: #94a3b8;
        line-height: 1.5;
      }

      /* FORM */
      .right {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .form-card {
        width: 400px;
        padding: 30px;
        border-radius: 16px;
        background: #020617;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
      }

      .form-card h3 {
        margin-bottom: 15px;
      }

      .input {
        width: 100%;
        padding: 12px;
        margin-bottom: 12px;
        border: none;
        border-radius: 8px;
        background: #0f172a;
        color: #fff;
        box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.1);
        box-sizing: border-box;
      }

      .input::placeholder {
        color: #9ca3af;
      }
      .input:focus {
        outline: none;
        border: 1px solid #38bdf8;
      }

      textarea.input {
        height: 110px;
      }

      .btn {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 10px;
        background: #38bdf8;
        cursor: pointer;
        font-weight: bold;
      }

      .btn:hover {
        background: transparent;
        border: 1px solid #38bdf8;
        color: white;
        transform: translateY(-1px);
        transition: 0.3s ease-in-out;
      }

      .msg {
        margin-top: 10px;
      }
      .success {
        color: #00ffee;
      }
      .error {
        color: #ff4d4d;
      }

      @media screen and (max-width: 768px) {
        .sidebar {
          display: none;
        }
        .content {
          grid-template-columns: 1fr;
          gap: 20px;
        }
        .form-card {
          width: 460px;
          padding: 30px;
          border-radius: 16px;
          background: #020617;
          box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
        }
      }
    </style>
  </head>
  <body>
    <!-- SIDEBAR -->
    <div class="sidebar">
      <h2>Dashboard</h2>
      <div class="nav-item">
        <a href="index.html"><i class="bx bx-home"></i> Home</a>
      </div>
      <div class="nav-item">
        <a href="profile.html"><i class="bx bx-user"></i> Profile</a>
      </div>
      <div class="nav-item">
        <a href="add-project.html"
          ><i class="bx bx-folder-plus"></i> Add Project</a
        >
      </div>
      <div class="nav-item">
        <a href=""><i class="bx bx-message-square-add"></i> Add Testimonial</a>
      </div>
      <div class="nav-item" id="logout">
        <i class="bx bx-log-out"></i> Logout
      </div>
    </div>
    <!-- MAIN -->
    <div class="main">
      <!-- HEADER -->
      <div class="header">
        <h1 class="logo">AlexSite</h1>
        <div class="dots" id="dots"></div>
      </div>
      <!-- CONTENT -->
      <div class="content">
        <!-- LEFT SIDE -->
        <div class="left">
          <div class="left-box">
            <h2>Let's talk</h2>
            <p>
              Send us your inquiry and we will respond quickly. We are always
              ready to help bring your ideas to life.
            </p>
          </div>
        </div>

        <!-- RIGHT SIDE -->
        <div class="right">
          <form class="form-card" id="form">
            <h3>Send Inquiry</h3>
            <input
              class="input"
              id="firstName"
              type="text"
              placeholder="First Name"
              required
            />

            <input
              class="input"
              id="middleName"
              type="text"
              placeholder="Middle Name"
              required
            />
            <input
              class="input"
              id="email"
              type="email"
              placeholder="Email"
              required
            />
            <input class="input" id="subject" placeholder="Subject" />
            <textarea
              class="input"
              id="message"
              placeholder="Message"
              required
            ></textarea>
            <button class="btn">Send Message</button>
            <div id="msg" class="msg"></div>
          </form>
        </div>
      </div>
    </div>
    <script>
      const firstName = document.getElementById("firstName");
      const middleName = document.getElementById("middleName");
      const email = document.getElementById("email");
      const subject = document.getElementById("subject");
      const message = document.getElementById("message");
      const token = localStorage.getItem("token");
      const logout = document.getElementById("logout");

      // animated dots
      const dotsContainer = document.getElementById("dots");
      for (let i = 0; i < 30; i++) {
        const d = document.createElement("div");
        d.className = "dot";
        d.style.animationDelay = i * 0.08 + "s";
        dotsContainer.appendChild(d);
      }

      // submit
      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const token = localStorage.getItem("token");

        const res = await fetch("http://localhost:5000/request", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: "Bearer " + token,
          },
          body: JSON.stringify({
            firstName: firstName.value,
            middleName: middleName.value,
            email: email.value,
            subject: subject.value,
            message: message.value,
          }),
        });

        const data = await res.json();
        console.log(data);

        if (res.ok) {
          msg.innerHTML = `<div class="success">Message sent successfully. We will get back to you ${data.message}.</div>`;
        } else {
          msg.innerHTML = '<div class="error">Something went wrong</div>';
        }
      });

      logout.addEventListener("click", () => {
        localStorage.removeItem("token");

        window.location.href = "index.html";
      });
    </script>
  </body>
</html>
