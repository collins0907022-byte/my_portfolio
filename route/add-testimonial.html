<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add-Testimonial</title>
    <link
      href="https://cdn.jsdelivr.net/npm/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
    <style>
      /* ================= RESET ================= */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Inter, sans-serif;
      }
      body {
        background: #0f172a;
        color: #fff;
        line-height: 1.5;
      }

      /* ================= WRAPPER ================= */
      .wrapper {
        display: flex;
        flex-direction: row;
        min-height: 100vh;
        gap: 20px;
        padding: 20px;
      }

      /* ================= SIDEBAR / DASHBOARD ================= */
      .sidebar {
        display: flex;
        flex-direction: column;
        gap: 15px;
        background: rgba(255, 255, 255, 0.04);
        padding: 20px;
        border-radius: 15px;
        flex: 0 0 220px;
      }

      .sidebar h2 {
        font-size: 18px;
        margin-bottom: 10px;
      }

      a {
        display: flex;
        align-items: center;
        gap: 5px;
        text-decoration: none;
        color: white;
        align-items: center;
      }

      .nav-item {
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 4px;
        margin-bottom: 4px;
        border-radius: 8px;
        padding-left: 10px;
        cursor: pointer;
        height: 50px;
        transition: background-color 0.3s ease;
        width: 100%;
        background-color: #0f172a;
      }

      .nav-item:hover {
        background: #1e293b;
      }

      .sidebar a svg {
        width: 20px;
        height: 20px;
        fill: #cbd5f5;
      }

      /* ================= MAIN CONTENT ================= */
      .main {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      /* ================= CARD ================= */
      .card {
        background: rgba(255, 255, 255, 0.05);
        padding: 25px;
        border-radius: 20px;
        backdrop-filter: blur(12px);
        box-shadow: 0 15px 50px rgba(0, 0, 0, 0.5);
      }

      .title {
        font-size: 22px;
        margin-bottom: 20px;

        color: #94a3b8;
      }
      /* ================= FORM ================= */
      .form {
        display: flex;
        flex-direction: column;
        gap: 15px;
      }

      input,
      textarea {
        padding: 15px;
        border-radius: 10px;
        border: none;
        background: #0f172a;
        color: #fff;
        font-size: 16px;
      }

      input:focus,
      textarea:focus {
        outline: 0.5px solid #38bdf8;
      }

      textarea {
        min-height: 150px;
      }

      /* ================= IMAGE UPLOAD ================= */
      .upload {
        border: 2px dashed #38bdf8;
        border-radius: 15px;
        padding: 25px;
        text-align: center;
        position: relative;
        min-height: 250px;
      }

      .upload input[type="file"] {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        opacity: 0;
        cursor: pointer;
      }

      .preview {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 15px;
        margin-top: 15px;
      }

      .preview img {
        width: 100%;
        height: 150px;
        object-fit: cover;
        border-radius: 12px;
      }

      /* ================= BUTTON ================= */
      button {
        padding: 15px;
        border: none;
        border-radius: 10px;
        background: #38bdf8;
        color: white;
        cursor: pointer;
        font-size: 16px;
        transition: 0.3s;
      }

      button:hover {
        transform: translateY(-2px);
        background-color: #1e293b;
        border: 1px solid #38bdf8;
      }

      /* ================= RESPONSIVE MOBILE ================= */
      @media (max-width: 900px) {
        .wrapper {
          flex-direction: column;
        }

        .sidebar {
          width: 100%;
          flex-direction: column;
        }

        .main {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <script src="auth.js"></script>
    <script>
      requireAuth();
    </script>
    <div class="wrapper">
      <!-- SIDEBAR / DASHBOARD -->
      <div class="sidebar">
        <h2>Dashboard</h2>
        <div class="nav-item">
          <a href="index.html"><i class="bx bx-home"></i> Home</a>
        </div>
        <div class="nav-item">
          <a href="profile.html"><i class="bx bx-user"></i> Profile</a>
        </div>
        <div class="nav-item">
          <a href="add-project.html"
            ><i class="bx bx-folder-plus"></i> Add Project</a
          >
        </div>
        <div class="nav-item">
          <a href="add-testimonial.html"
            ><i class="bx bx-message-square-add"></i> Add Testimonial</a
          >
        </div>

        <div class="nav-item"><i class="bx bx-log-out"></i> Logout</div>
      </div>

      <!-- MAIN CONTENT -->
      <div class="main">
        <!-- FORM CARD -->
        <div class="card">
          <div class="title">Add Testimonial</div>
          <form id="form" class="form">
            <input id="name" placeholder="Full Name" required />
            <textarea
              id="desc"
              placeholder="Message / Description"
              required
            ></textarea>
            <input id="link" placeholder="Work / Website Link" />

            <!-- IMAGE UPLOAD -->
            <div class="upload">
              Click or drag image here
              <input type="file" id="image" accept="image/*" />
              <div class="preview" id="preview"></div>
            </div>

            <button type="submit">Add</button>
          </form>
        </div>
      </div>
    </div>

    <script>
      const token = localStorage.getItem("token");
      // IMAGE PREVIEW
      const input = document.getElementById("image");
      const preview = document.getElementById("preview");

      input.addEventListener("change", () => {
        preview.innerHTML = "";
        Array.from(input.files).forEach((f) => {
          const img = document.createElement("img");
          img.src = URL.createObjectURL(f);
          preview.appendChild(img);
        });
      });

      document.getElementById("form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const formData = new FormData();
        formData.append("name", document.getElementById("name").value);
        formData.append("message", document.getElementById("desc").value);
        formData.append("link", document.getElementById("link").value);
        formData.append("image", input.files[0]);

        try {
          const res = await fetch(
            "https://alexsite-qpff.onrender.com/addTestimonial",
            {
              method: "POST",
              headers: {
                Authorization: "Bearer " + token,
              },
              body: formData,
            },
          );
          const data = await res.json();
          if (res.ok) {
            alert("Testimonial added successfully");
          } else {
            alert("Failed to add testimonial");
          }
        } catch (err) {
          console.error(err);
          alert("Error submitting testimonial");
        }
      });
    </script>
  </body>
</html>
